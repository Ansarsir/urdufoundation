<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urdu Foundation Program</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0e0e1c;
  color: white;
  margin: 0;
  padding: 40px;
}

h1 { margin-bottom: 10px; }

.price {
  font-size: 28px;
  margin: 10px 0;
}

select {
  padding: 8px;
  border-radius: 6px;
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>Urdu Foundation Program</h1>

<p>Select your currency:</p>

<select id="currency-switcher">
  <option value="IN">🇮🇳 India (₹)</option>
  <option value="US">🌍 International ($)</option>
</select>

<div class="price" data-price="p1"></div>
<div class="price" data-price="p2"></div>
<div class="price" data-price="p3"></div>

<script>
const pricing = {
  IN: { symbol: '₹', p1: '1,499', p2: '1,999', p3: '2,499' },
  US: { symbol: '$', p1: '48', p2: '58', p3: '72' }
};

function applyPricing(code) {
  const p = pricing[code] || pricing['IN'];

  document.querySelectorAll('[data-price]').forEach(el => {
    const key = el.getAttribute('data-price');
    el.innerHTML = p.symbol + p[key];
  });

  document.getElementById('currency-switcher').value = code;
}

function setCurrency(code) {
  localStorage.setItem('currency', code);
  applyPricing(code);
}

document.getElementById('currency-switcher')
  .addEventListener('change', e => setCurrency(e.target.value));

function init() {
  const saved = localStorage.getItem('currency');
  if (saved) {
    applyPricing(saved);
  } else {
    applyPricing('IN'); // default INR
  }
}

init();
</script>

</body>
</html>
